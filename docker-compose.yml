services:
  server:
    build:
      context: ./server
    container_name: cashflowcontrol_server
    restart: unless-stopped
    ports:
      - '3333:3333'
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build:
      context: ./client
    container_name: cashflowcontrol_client
    restart: unless-stopped
    ports:
      - '5173:5173'
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules
