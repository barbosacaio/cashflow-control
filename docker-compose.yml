services:
  db:
    image: postgres:16
    container_name: cashflowcontrol_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cashflowcontrol}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cashflowcontrol}
      POSTGRES_DB: ${POSTGRES_DB:-cashflowcontrol}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
  server:
    build:
      context: ./server
    container_name: cashflowcontrol_server
    restart: unless-stopped
    ports:
      - '3333:3333'
    env_file:
      - ./server/.env
    depends_on:
      - db
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build:
      context: ./client
    container_name: cashflowcontrol_client
    restart: unless-stopped
    ports:
      - '5173:5173'
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  pgdata:
